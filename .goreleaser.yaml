version: 2
project_name: bedrock

before:
  hooks:
    - go mod tidy

builds:
  - id: bedrock
    main: .
    binary: bedrock
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X github.com/whitworth-org/bedrock/internal/version.Version={{.Version}}
      - -X github.com/whitworth-org/bedrock/internal/version.Commit={{.Commit}}
      - -X github.com/whitworth-org/bedrock/internal/version.Date={{.Date}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
